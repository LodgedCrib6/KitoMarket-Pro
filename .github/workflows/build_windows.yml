name: Build KitoMarket - All Platforms

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: pip install customtkinter pyinstaller pillow
      - name: Construir EXE
        run: pyinstaller --onefile --windowed --icon=KitoLogo.ico --add-data "KitoLogo.ico;." --add-data "KitoLogo.png;." --name KitoMarketPro minimarket_app.py
      - uses: actions/upload-artifact@v4
        with:
          name: KitoMarketPro-Windows
          path: dist/KitoMarketPro.exe

  build-macos-apple-silicon:
    runs-on: macos-latest  # M1/M2 runner (ARM64)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: pip install customtkinter pyinstaller pillow
      - name: Convertir PNG a ICNS
        run: |
          mkdir -p KitoLogo.iconset
          sips -z 16 16     KitoLogo.png --out KitoLogo.iconset/icon_16x16.png
          sips -z 32 32     KitoLogo.png --out KitoLogo.iconset/icon_16x16@2x.png
          sips -z 32 32     KitoLogo.png --out KitoLogo.iconset/icon_32x32.png
          sips -z 64 64     KitoLogo.png --out KitoLogo.iconset/icon_32x32@2x.png
          sips -z 128 128   KitoLogo.png --out KitoLogo.iconset/icon_128x128.png
          sips -z 256 256   KitoLogo.png --out KitoLogo.iconset/icon_128x128@2x.png
          sips -z 256 256   KitoLogo.png --out KitoLogo.iconset/icon_256x256.png
          sips -z 512 512   KitoLogo.png --out KitoLogo.iconset/icon_256x256@2x.png
          sips -z 512 512   KitoLogo.png --out KitoLogo.iconset/icon_512x512.png
          iconutil -c icns KitoLogo.iconset -o KitoLogo.icns
      - name: Construir .app
        run: pyinstaller --windowed --icon=KitoLogo.icns --add-data "KitoLogo.png:." --name KitoMarketPro minimarket_app.py
      - name: Empaquetar en DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "KitoMarket Pro (Apple Silicon)" \
            --window-size 500 300 \
            --icon-size 100 \
            --icon "KitoMarketPro.app" 120 150 \
            --app-drop-link 380 150 \
            "KitoMarketPro-AppleSilicon.dmg" \
            "dist/"
      - uses: actions/upload-artifact@v4
        with:
          name: KitoMarketPro-macOS-AppleSilicon
          path: KitoMarketPro-AppleSilicon.dmg

  build-macos-intel:
    runs-on: macos-13  # Runner con Intel (x86_64)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: pip install customtkinter pyinstaller pillow
      - name: Convertir PNG a ICNS
        run: |
          mkdir -p KitoLogo.iconset
          sips -z 16 16     KitoLogo.png --out KitoLogo.iconset/icon_16x16.png
          sips -z 32 32     KitoLogo.png --out KitoLogo.iconset/icon_16x16@2x.png
          sips -z 32 32     KitoLogo.png --out KitoLogo.iconset/icon_32x32.png
          sips -z 64 64     KitoLogo.png --out KitoLogo.iconset/icon_32x32@2x.png
          sips -z 128 128   KitoLogo.png --out KitoLogo.iconset/icon_128x128.png
          sips -z 256 256   KitoLogo.png --out KitoLogo.iconset/icon_128x128@2x.png
          sips -z 256 256   KitoLogo.png --out KitoLogo.iconset/icon_256x256.png
          sips -z 512 512   KitoLogo.png --out KitoLogo.iconset/icon_256x256@2x.png
          sips -z 512 512   KitoLogo.png --out KitoLogo.iconset/icon_512x512.png
          iconutil -c icns KitoLogo.iconset -o KitoLogo.icns
      - name: Construir .app
        run: pyinstaller --windowed --icon=KitoLogo.icns --add-data "KitoLogo.png:." --name KitoMarketPro minimarket_app.py
      - name: Empaquetar en DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "KitoMarket Pro (Intel)" \
            --window-size 500 300 \
            --icon-size 100 \
            --icon "KitoMarketPro.app" 120 150 \
            --app-drop-link 380 150 \
            "KitoMarketPro-Intel.dmg" \
            "dist/"
      - uses: actions/upload-artifact@v4
        with:
          name: KitoMarketPro-macOS-Intel
          path: KitoMarketPro-Intel.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk fuse libfuse2 file
      - name: Instalar dependencias Python
        run: pip install customtkinter pyinstaller pillow
      - name: Construir binario
        run: pyinstaller --onefile --windowed --add-data "KitoLogo.png:." --add-data "KitoLogo256.png:." --hidden-import PIL._tkinter_finder --name KitoMarketPro minimarket_app.py
      - name: Crear estructura AppImage
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/64x64/apps
          mkdir -p AppDir/usr/share/icons/hicolor/128x128/apps
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp dist/KitoMarketPro AppDir/usr/bin/
          
          # Copiar ícono a múltiples tamaños
          cp KitoLogo256.png AppDir/usr/share/icons/hicolor/256x256/apps/kitomarket.png
          cp KitoLogo256.png AppDir/usr/share/icons/hicolor/128x128/apps/kitomarket.png
          cp KitoLogo256.png AppDir/usr/share/icons/hicolor/64x64/apps/kitomarket.png
          cp KitoLogo256.png AppDir/kitomarket.png
          ln -s kitomarket.png AppDir/.DirIcon

          # Desktop entry con metadatos AppImage
          cat > AppDir/kitomarket.desktop << 'DESKTOP'
          [Desktop Entry]
          X-AppImage-Arch=x86_64
          X-AppImage-Version=1.0
          X-AppImage-Name=KitoMarketPro
          Name=KitoMarket Pro
          Exec=KitoMarketPro
          Icon=kitomarket
          Type=Application
          Categories=Office;
          Terminal=false
          DESKTOP

          # AppRun
          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin/:${PATH}"
          exec "${HERE}/usr/bin/KitoMarketPro" "$@"
          APPRUN
          chmod +x AppDir/AppRun

      - name: Descargar y ejecutar appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir KitoMarketPro.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: KitoMarketPro-Linux
          path: KitoMarketPro.AppImage
