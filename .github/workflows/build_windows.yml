name: Build KitoMarket - All Platforms

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install customtkinter pyinstaller pillow

      - name: Construir EXE
        run: >
          pyinstaller --onefile --windowed
          --icon=KitoLogo.ico
          --add-data "KitoLogo.ico;."
          --add-data "KitoLogo.png;."
          --name KitoMarketPro
          minimarket_app.py

      - uses: actions/upload-artifact@v4
        with:
          name: KitoMarketPro-Windows
          path: dist/KitoMarketPro.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install customtkinter pyinstaller pillow

      - name: Convertir PNG a ICNS
        run: |
          mkdir -p KitoLogo.iconset
          sips -z 512 512 KitoLogo.png --out KitoLogo.iconset/icon_512x512.png
          iconutil -c icns KitoLogo.iconset -o KitoLogo.icns

      - name: Construir APP
        run: >
          pyinstaller --windowed
          --icon=KitoLogo.icns
          --add-data "KitoLogo.png:."
          --name KitoMarketPro
          minimarket_app.py

      - uses: actions/upload-artifact@v4
        with:
          name: KitoMarketPro-macOS
          path: dist/

 build-linux:
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Instalar dependencias del sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk fuse libfuse2 file desktop-file-utils

    - name: Instalar dependencias Python
      run: pip install customtkinter pyinstaller pillow

    - name: Build binario
      run: |
        pyinstaller --onefile --windowed \
          --add-data "KitoLogo.png:." \
          --name KitoMarketPro minimarket_app.py

    - name: Crear AppDir
      run: |
        mkdir -p AppDir/usr/bin
        mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

        cp dist/KitoMarketPro AppDir/usr/bin/

        # ICONOS
        cp KitoLogo.png AppDir/.DirIcon
        cp KitoLogo.png AppDir/KitoMarketPro.png
        cp KitoLogo.png AppDir/usr/share/icons/hicolor/256x256/apps/KitoMarketPro.png

        # DESKTOP (SIN INDENTACIÓN = CRÍTICO)
        cat > AppDir/KitoMarketPro.desktop <<EOF
[Desktop Entry]
Type=Application
Name=KitoMarket Pro
Exec=KitoMarketPro
Icon=KitoMarketPro
StartupWMClass=KitoMarketPro
Terminal=false
Categories=Office;
EOF

        # VALIDAR (esto evita crash silencioso)
        desktop-file-validate AppDir/KitoMarketPro.desktop

        # APPRUN
        cat > AppDir/AppRun <<EOF
#!/bin/bash
HERE="$(dirname "$(readlink -f "$0")")"
exec "$HERE/usr/bin/KitoMarketPro" "$@"
EOF

        chmod +x AppDir/AppRun

    - name: Build AppImage
      run: |
        wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage

        export ARCH=x86_64
        ./appimagetool-x86_64.AppImage AppDir KitoMarketPro.AppImage

    - uses: actions/upload-artifact@v4
      with:
        name: KitoMarketPro-Linux
        path: KitoMarketPro.AppImage
