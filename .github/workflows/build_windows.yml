build-linux:
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Instalar dependencias del sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk fuse libfuse2 file

    - name: Instalar dependencias Python
      run: pip install customtkinter pyinstaller pillow

    - name: Construir binario
      run: |
        pyinstaller --onefile --windowed \
          --add-data "KitoLogo.png:." \
          --name KitoMarketPro minimarket_app.py

    - name: Crear AppImage
      run: |
        mkdir -p AppDir/usr/bin
        mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

        cp dist/KitoMarketPro AppDir/usr/bin/
        cp KitoLogo.png AppDir/.DirIcon
        cp KitoLogo.png AppDir/KitoMarketPro.png
        cp KitoLogo.png AppDir/usr/share/icons/hicolor/256x256/apps/KitoMarketPro.png

        echo "[Desktop Entry]" > AppDir/KitoMarketPro.desktop
        echo "Type=Application" >> AppDir/KitoMarketPro.desktop
        echo "Name=KitoMarket Pro" >> AppDir/KitoMarketPro.desktop
        echo "Exec=KitoMarketPro" >> AppDir/KitoMarketPro.desktop
        echo "Icon=KitoMarketPro" >> AppDir/KitoMarketPro.desktop
        echo "Terminal=false" >> AppDir/KitoMarketPro.desktop
        echo "Categories=Office;Utility;" >> AppDir/KitoMarketPro.desktop

        echo '#!/bin/bash' > AppDir/AppRun
        echo 'SELF=$(readlink -f "$0")' >> AppDir/AppRun
        echo 'HERE=${SELF%/*}' >> AppDir/AppRun
        echo 'export PATH="${HERE}/usr/bin/:${PATH}"' >> AppDir/AppRun
        echo 'exec "${HERE}/usr/bin/KitoMarketPro" "$@"' >> AppDir/AppRun

        chmod +x AppDir/AppRun

    - name: Construir AppImage
      run: |
        wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage
        ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir KitoMarketPro.AppImage

    - uses: actions/upload-artifact@v4
      with:
        name: KitoMarketPro-Linux
        path: KitoMarketPro.AppImage
